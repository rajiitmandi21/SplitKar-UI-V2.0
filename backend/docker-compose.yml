version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: splitwise
      POSTGRES_USER: default
      POSTGRES_PASSWORD: pJTSg04kbGYD
      DATABASE_URL: postgres://default:pJTSg04kbGYD@ep-ancient-river-a4da9t9r.us-east-1.aws.neon.tech:5432/splitwise?sslmode=require
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U default -d splitwise"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://default:pJTSg04kbGYD@ep-ancient-river-a4da9t9r.us-east-1.aws.neon.tech:5432/splitwise?sslmode=require
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - JWT_EXPIRES_IN=7d
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
