services:
  postgres:
    image: postgres:15
    container_name: splitkar-postgres
    environment:
      POSTGRES_DB: splitkar
      POSTGRES_USER: splitkar_user
      POSTGRES_PASSWORD: splitkar_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - splitkar-network

  redis:
    image: redis:7-alpine
    container_name: splitkar-redis
    ports:
      - "6379:6379"
    networks:
      - splitkar-network

volumes:
  postgres_data:

networks:
  splitkar-network:
    driver: bridge
